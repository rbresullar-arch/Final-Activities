<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Examinations — Dashboard</title>
<style>
  :root {
    --bg: #f7f6f2;
    --ink: #1a1a1a;
    --mid: #666;
    --line: #d0cfc9;
    --accent: #c0392b;
    --green: #27ae60;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Courier New', Courier, monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2.5rem 1rem;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  .top-label { font-size: 0.7rem; letter-spacing: .12em; text-transform: uppercase; color: var(--mid); margin-bottom: 0.4rem; }
  h1 { font-size: 1.3rem; border-bottom: 2px solid var(--ink); padding-bottom: 0.55rem; margin-bottom: 0.5rem; }
  .tagline { font-size: 0.8rem; color: var(--mid); margin-bottom: 2rem; }

  .section-label {
    font-size: 0.68rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--mid); margin-bottom: 0.75rem;
    border-bottom: 1px solid var(--line); padding-bottom: 0.3rem;
  }

  .activity-list { display: flex; flex-direction: column; gap: 0.55rem; }

  .activity-row {
    display: flex; align-items: center; gap: 0.9rem;
    background: #fff; border: 1px solid var(--line); padding: 0.8rem 0.9rem;
  }

  .activity-info { flex: 1; min-width: 0; }
  .a-num   { font-size: 0.7rem; color: var(--mid); margin-bottom: 0.1rem; letter-spacing: .06em; }
  .a-title { font-size: 0.9rem; font-weight: bold; }
  .a-meta  { font-size: 0.72rem; color: var(--mid); margin-top: 0.15rem; }

  .activity-score {
    font-size: 1.15rem; font-weight: bold;
    text-align: right; flex-shrink: 0; min-width: 3.2rem;
  }
  .activity-score.high { color: var(--green); }
  .activity-score.mid  { color: #e67e22; }
  .activity-score.low  { color: var(--accent); }
  .activity-score.none { color: var(--line); font-size: 0.8rem; font-weight: normal; }

  .open-btn {
    flex-shrink: 0;
    padding: 0.45rem 1rem;
    background: var(--ink); color: var(--bg);
    border: none; font-family: inherit; font-size: 0.8rem;
    letter-spacing: .05em; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  .open-btn:hover { background: #444; }
  .open-btn.submitted {
    background: var(--bg); color: var(--mid);
    border: 1px solid var(--line); cursor: default;
  }
  .open-btn.submitted:hover { background: var(--bg); }
</style>
</head>
<body>
<div class="wrap">

  <p class="top-label">Physics · Examination Portal</p>
  <h1>Activity Dashboard</h1>
  <p class="tagline">Select an examination to begin. Each test can only be taken once.</p>

  <p class="section-label">Examinations</p>
  <div class="activity-list" id="activity-list"></div>

</div>

<script>
const ACTIVITIES = [
  {
    title: 'Thermal Equilibrium',
    meta:  '10 questions · 5 min each · scaled to 100',
    file:  'thermal_equilibrium.html',
    lock:  'quiz_thermal_eq_done'
  },
  {
    title: 'Work & Internal Energy',
    meta:  '5 questions · 3 min each · 20 pts each',
    file:  'work_and_internal_energy.html',
    lock:  'quiz_work_internal_energy_done'
  },
  {
    title: 'Thermal Conductivity & Heat Engines',
    meta:  '5 questions · 5 min each · 20 pts each',
    file:  'thermal_conductivity_heat_engines.html',
    lock:  'quiz_conductivity_heatengines_done'
  },
  {
    title: "Current, Resistance & Ohm's Law",
    meta:  '5 questions · 5 min each · 20 pts each',
    file:  'current_resistance_ohms_law.html',
    lock:  'quiz_current_resistance_ohms_done'
  },
  {
    title: "Coulomb's Law & Potential Difference",
    meta:  '5 questions · 5 min each · 20 pts each',
    file:  'coulombs_law_potential_difference.html',
    lock:  'quiz_coulombs_potential_done'
  }
];

function getRecord(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
}
function scoreClass(s) {
  if (s === null) return 'none';
  if (s >= 80)   return 'high';
  if (s >= 50)   return 'mid';
  return 'low';
}

function render() {
  const list = document.getElementById('activity-list');
  list.innerHTML = '';

  ACTIVITIES.forEach((act, i) => {
    const rec   = getRecord(act.lock);
    const done  = !!rec;
    const score = done ? rec.score : null;

    const row = document.createElement('div');
    row.className = 'activity-row';

    // info
    const info = document.createElement('div');
    info.className = 'activity-info';
    info.innerHTML = `
      <div class="a-num">Activity ${i + 1}</div>
      <div class="a-title">${act.title}</div>
      <div class="a-meta">${act.meta}</div>
    `;
    row.appendChild(info);

    // score
    const sc = document.createElement('div');
    sc.className = `activity-score ${scoreClass(score)}`;
    sc.textContent = score !== null ? `${score}` : '—';
    row.appendChild(sc);

    // button
    const btn = document.createElement('button');
    if (done) {
      btn.className   = 'open-btn submitted';
      btn.textContent = 'Submitted';
      btn.disabled    = true;
    } else {
      btn.className   = 'open-btn';
      btn.textContent = 'Open →';
      btn.onclick     = () => { window.location.href = act.file; };
    }
    row.appendChild(btn);

    list.appendChild(row);
  });
}

render();
</script>
</body>
</html>
